name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build CypressLauncher
      shell: pwsh
      run: dotnet publish CypressLauncher.csproj -c Release -f net8.0-windows -o publish/CypressLauncher /p:LangVersion=latest

    - name: Download Server DLLs
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.CYPRESS_SERVER_TOKEN }}
      run: |
        $stage = "publish/CypressLauncher"
        $headers = @{ 'User-Agent' = 'CypressCI'; 'Authorization' = "Bearer $env:GH_TOKEN"; 'Accept' = 'application/vnd.github+json' }
        # download latest server dlls from PvZ-Cypress/Server releases
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/PvZ-Cypress/Server/releases/latest" -Headers $headers
        foreach ($asset in $release.assets) {
          if ($asset.name -match '\.dll$') {
            $dlHeaders = @{ 'Authorization' = "Bearer $env:GH_TOKEN"; 'Accept' = 'application/octet-stream'; 'User-Agent' = 'CypressCI' }
            Invoke-WebRequest -Uri $asset.url -OutFile "$stage/$($asset.name)" -Headers $dlHeaders
            Write-Host "Downloaded $($asset.name)"
          }
        }

    - name: Stage release artifacts
      shell: pwsh
      run: |
        $stage = "publish/CypressLauncher"

        Copy-Item "courgette.exe" $stage -ErrorAction SilentlyContinue
        Copy-Item "GW2.patch" $stage
        Copy-Item "BFN.Patch" $stage

        if (Test-Path "Docs") {
          Copy-Item "Docs" "$stage/README" -Recurse
        }

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Cypress
        path: publish/CypressLauncher

    - name: Create release archive
      if: startsWith(github.ref, 'refs/tags/v')
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        Compress-Archive -Path "publish/CypressLauncher/*" -DestinationPath "Cypress-$tag.zip"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Cypress-*.zip
        generate_release_notes: true
        draft: false
        prerelease: false
